<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>皮克敏蘑菇計時器 - 極簡精煉版</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --accent-blue: #38bdf8;
            --accent-yellow: #fbbf24;
            --accent-green: #4ade80;
            --accent-red: #ff4444;
            --text-main: #f1f5f9;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Segoe UI', "Microsoft JhengHei", sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .page-header {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            gap: 20px;
            margin-bottom: 40px;
            padding: 30px;
            background: linear-gradient(145deg, #1e293b, #0f172a);
            border-radius: 24px;
            width: 100%;
            max-width: 900px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.5);
            border: 1px solid #334155;
        }

        .header-info { width: 100%; }
        .main-title {
            font-size: 32px;
            font-weight: 900;
            color: var(--accent-green);
            margin: 0 0 10px 0;
            letter-spacing: 2px;
            text-shadow: 0 0 15px rgba(74, 222, 128, 0.3);
        }
        #mainClock { font-size: 55px; font-weight: 800; color: var(--accent-blue); margin: 0; font-family: monospace; }
        #mainDate { font-size: 18px; color: #94a3b8; }

        .announcement-board {
            width: 100%;
            max-width: 600px;
            background: rgba(15, 23, 42, 0.6);
            border-top: 3px solid var(--accent-blue);
            padding: 15px 25px;
            border-radius: 12px;
            text-align: left;
        }
        .announcement-title {
            font-size: 16px;
            font-weight: bold;
            color: var(--accent-blue);
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .announcement-list {
            margin: 0; padding: 0; list-style: none; font-size: 14px; line-height: 1.6; color: #cbd5e1;
        }
        .announcement-list li { position: relative; padding-left: 20px; margin-bottom: 5px; }
        .announcement-list li::before { content: "✓"; position: absolute; left: 0; color: var(--accent-green); font-weight: bold; }

        .timer-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 25px;
            width: 100%;
            max-width: 1300px;
        }

        .timer-card {
            background-color: var(--card-bg);
            border: 1px solid #334155;
            border-radius: 24px;
            padding: 25px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.4);
        }

        .card-title {
            font-size: 22px; color: #fff; margin-bottom: 10px; font-weight: bold;
            border-bottom: 1px solid #334155; padding-bottom: 8px;
        }

        .time-display {
            font-size: 52px;
            color: var(--accent-yellow);
            font-family: 'Courier New', monospace;
            margin: 15px 0 5px 0;
            font-weight: bold;
        }

        .end-time-label { font-size: 15px; color: var(--accent-green); margin-bottom: 12px; height: 22px; }

        .warning-text {
            color: var(--accent-red); font-size: 14px; font-weight: 900; margin-bottom: 20px;
            min-height: 40px; display: flex; align-items: center; justify-content: center;
            line-height: 1.4; background: rgba(255, 68, 68, 0.1); border-radius: 8px;
            animation: pulse 2s infinite;
        }

        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.7; } 100% { opacity: 1; } }

        .input-group { display: flex; flex-direction: column; gap: 12px; }

        .note-input {
            padding: 12px; border-radius: 10px; border: 1px solid #334155;
            background: #0f172a; color: white; text-align: center; outline: none; font-size: 16px;
        }

        .time-input-wrap {
            display: flex; justify-content: center; align-items: center; gap: 5px;
            background: #0f172a; padding: 10px; border-radius: 10px;
        }
        .time-unit {
            width: 45px; background: transparent; border: none; color: var(--accent-yellow);
            font-size: 22px; text-align: center; font-family: monospace; outline: none;
        }

        .btn-main-group { display: flex; gap: 10px; }

        button { cursor: pointer; font-weight: bold; transition: 0.2s; border: none; font-size: 16px; }
        .btn-start { flex: 2; padding: 14px; background-color: var(--accent-blue); color: #000; border-radius: 10px; }
        .btn-reset { flex: 1; padding: 14px; background-color: #475569; color: white; border-radius: 10px; }
        button:hover:not(:disabled) { opacity: 0.9; transform: translateY(-1px); }
        button:disabled { background-color: #1e293b; color: #475569; cursor: not-allowed; }

        @media (max-width: 1000px) { .timer-grid { grid-template-columns: repeat(2, 1fr); } }
        @media (max-width: 650px) { .timer-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

    <div class="page-header">
        <div class="header-info">
            <h1 class="main-title">🍄 皮克敏蘑菇計時器 🍄</h1>
            <div id="mainClock">00:00:00</div>
            <div id="mainDate">載入中...</div>
        </div>

        <div class="announcement-board">
            <div class="announcement-title">📢 優化與更新公告</div>
            <ul class="announcement-list">
                <li>4/6 移除不具效益之時間微調按鈕，介面精簡化</li>
                <li>4/6 全面支援 Enter 鍵快速啟動計時功能</li>
                <li>4/6 修復手動輸入時自動跳格與備註同步邏輯</li>
            </ul>
        </div>
    </div>

    <div class="timer-grid" id="gridContainer"></div>

    <script>
        function updateMainClock() {
            const now = new Date();
            document.getElementById('mainClock').textContent = now.toLocaleTimeString('zh-TW', { hour12: false });
            document.getElementById('mainDate').textContent = `${now.getFullYear()}年${now.getMonth() + 1}月${now.getDate()}日`;
        }
        setInterval(updateMainClock, 1000);
        updateMainClock();

        const grid = document.getElementById('gridContainer');
        const timerIntervals = [];

        for (let i = 1; i <= 6; i++) {
            const card = document.createElement('div');
            card.className = 'timer-card';
            card.innerHTML = `
                <span class="card-title" id="title-${i}">蘑菇 ${i}</span>
                <div class="time-display" id="display-${i}">00:00:00</div>
                <div class="end-time-label" id="endTime-${i}"></div>
                
                <div class="warning-text">時間過長，可能因玩家加入<br>使蘑菇重生時間提前</div>
                
                <div class="input-group">
                    <input type="text" class="note-input" id="note-${i}" placeholder="輸入備註 (如: 大火紅)" oninput="syncTitle(${i})" onkeydown="handleEnter(event, ${i})">
                    <div class="time-input-wrap" id="inputWrap-${i}">
                        <input type="text" class="time-unit" id="h-${i}" maxlength="2" placeholder="hh" autocomplete="off">
                        <span style="color:#475569">:</span>
                        <input type="text" class="time-unit" id="m-${i}" maxlength="2" placeholder="mm" autocomplete="off">
                        <span style="color:#475569">:</span>
                        <input type="text" class="time-unit" id="s-${i}" maxlength="2" placeholder="ss" autocomplete="off">
                    </div>
                    <div class="btn-main-group">
                        <button class="btn-start" id="startBtn-${i}" onclick="startTimer(${i})">開始 (+5分)</button>
                        <button class="btn-reset" onclick="resetTimer(${i})">重設</button>
                    </div>
                </div>
            `;
            grid.appendChild(card);
            setupInputLogic(i);
        }

        function handleEnter(e, id) {
            if (e.key === 'Enter') startTimer(id);
        }

        function setupInputLogic(id) {
            const units = ['h', 'm', 's'];
            units.forEach((unit, idx) => {
                const el = document.getElementById(`${unit}-${id}`);
                el.addEventListener('keydown', e => { 
                    if (e.key === 'Enter') { startTimer(id); return; }
                    if (e.key.length === 1 && !/[0-9]/.test(e.key)) e.preventDefault();
                });
                el.addEventListener('input', function() {
                    if (this.value.length === 2 && idx < 2) {
                        setTimeout(() => {
                            const nextEl = document.getElementById(`${units[idx+1]}-${id}`);
                            nextEl.focus();
                            nextEl.select(); 
                        }, 10);
                    }
                });
                el.onclick = function() { this.select(); };
            });
        }

        function syncTitle(id) {
            const val = document.getElementById(`note-${id}`).value;
            document.getElementById(`title-${id}`).textContent = val || `蘑菇 ${id}`;
        }

        function startTimer(id) {
            const h = parseInt(document.getElementById(`h-${id}`).value) || 0;
            const m = parseInt(document.getElementById(`m-${id}`).value) || 0;
            const s = parseInt(document.getElementById(`s-${id}`).value) || 0;

            let totalSeconds = (h * 3600) + (m * 60) + s + 300; 

            document.getElementById(`startBtn-${id}`).disabled = true;
            document.getElementById(`inputWrap-${id}`).style.opacity = "0.3";
            ['h', 'm', 's', 'note'].forEach(u => {
                const target = document.getElementById(`${u}-${id}`);
                if(target) target.disabled = true;
            });

            const finishTime = new Date(Date.now() + totalSeconds * 1000);
            document.getElementById(`endTime-${id}`).textContent = `預計結束：${finishTime.toLocaleTimeString('zh-TW', {hour12:false})}`;

            updateDisplay(id, totalSeconds);

            if (timerIntervals[id]) clearInterval(timerIntervals[id]);
            timerIntervals[id] = setInterval(() => {
                totalSeconds--;
                if (totalSeconds <= 0) {
                    clearInterval(timerIntervals[id]);
                    timerIntervals[id] = null;
                    updateDisplay(id, 0);
                    document.getElementById(`endTime-${id}`).textContent = "蘑菇已成熟！";
                    document.getElementById(`display-${id}`).style.color = "#ef4444";
                    alert(`【${document.getElementById(`title-${id}`).textContent}】時間到囉！`);
                } else {
                    updateDisplay(id, totalSeconds);
                }
            }, 1000);
        }

        function resetTimer(id) {
            if (timerIntervals[id]) { clearInterval(timerIntervals[id]); timerIntervals[id] = null; }
            document.getElementById(`display-${id}`).textContent = "00:00:00";
            document.getElementById(`display-${id}`).style.color = "var(--accent-yellow)";
            document.getElementById(`endTime-${id}`).textContent = "";
            ['h', 'm', 's', 'note'].forEach(u => {
                const el = document.getElementById(`${u}-${id}`);
                if(el) { el.value = ""; el.disabled = false; }
            });
            document.getElementById(`startBtn-${id}`).disabled = false;
            document.getElementById(`inputWrap-${id}`).style.opacity = "1";
        }

        function updateDisplay(id, totalSecs) {
            const hh = Math.floor(totalSecs / 3600);
            const mm = Math.floor((totalSecs % 3600) / 60);
            const ss = totalSecs % 60;
            document.getElementById(`display-${id}`).textContent = 
                `${String(hh).padStart(2, '0')}:${String(mm).padStart(2, '0')}:${String(ss).padStart(2, '0')}`;
        }
    </script>
</body>
</html>
